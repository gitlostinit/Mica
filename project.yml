name: Mica

options:
  bundleIdPrefix: tv.weddle
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  defaultConfig: Debug
  groupSortPosition: top

packages:
  MicaCore:
    path: Shared

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""

targets:

  # ── iOS App ───────────────────────────────────────────────────────────────
  Mica:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Mica
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    dependencies:
      - package: MicaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tv.weddle.mica
        INFOPLIST_FILE: Mica/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mica/Mica.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - MicaCoreTests

  # ── macOS Container App ────────────────────────────────────────────────────
  MicaMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MicaMac
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    dependencies:
      - target: MicaQuickLook
        embed: true
      - target: MicaThumbnail
        embed: true
      - package: MicaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tv.weddle.mica.mac
        INFOPLIST_FILE: MicaMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: MicaMac/MicaMac.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ── Quick Look Preview Extension ───────────────────────────────────────────
  MicaQuickLook:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MicaQuickLook
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    dependencies:
      - package: MicaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tv.weddle.mica.mac.QuickLook
        INFOPLIST_FILE: MicaQuickLook/Info.plist
        CODE_SIGN_ENTITLEMENTS: MicaQuickLook/MicaQuickLook.entitlements

  # ── Thumbnail Extension ────────────────────────────────────────────────────
  MicaThumbnail:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MicaThumbnail
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    dependencies:
      - package: MicaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tv.weddle.mica.mac.Thumbnail
        INFOPLIST_FILE: MicaThumbnail/Info.plist
        CODE_SIGN_ENTITLEMENTS: MicaThumbnail/MicaThumbnail.entitlements

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  MicaCoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Shared/Tests/VaultPeekCoreTests
    dependencies:
      - package: MicaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tv.weddle.mica.tests
